        "200":
          description: JSON response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
  /v1/diagnostics/worktrees:
    get:
      summary: Worktree diagnostics
      responses:
        "200":
          description: JSON response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
  /v1/events:

syntax = "proto3";

package goosetower.v1;

import "goosetower/v1/common.proto";

message Command {
  string command_id = 1;
  string idempotency_key = 2;
  EntityRef target = 3;
  uint64 base_entity_version = 4;
  int64 created_at_client_unix_ms = 5;
  oneof payload {
    CommandSendTurn send_turn = 10;
    CommandResolveApproval resolve_approval = 11;
    CommandInterruptTurn interrupt_turn = 12;
    CommandSendTeamMessage send_team_message = 13;
    CommandBroadcastTeamMessage broadcast_team_message = 14;
    CommandSpawnTeamMember spawn_team_member = 15;
    CommandRetryDelivery retry_delivery = 16;
    CommandCancelDelivery cancel_delivery = 17;
    CommandKillProcess kill_process = 18;
    CommandStartProcess start_process = 19;
    CommandCreateSession create_session = 20;
    CommandCreateTeam create_team = 21;
  }
  reserved 30 to 79;
}

message CommandCreateSession {
  string provider = 1;
  string model = 2;
  string cwd = 3;
  string title = 4;
  string permission_mode = 5;
  map<string, string> metadata = 6;
  reserved 20 to 39;
}

message CommandCreateTeam {
  string name = 1;
  string lead_agent_id = 2;
  repeated string member_agent_ids = 3;
  string created_by = 4;
  reserved 20 to 39;
}

message CommandSendTurn {
  string session_id = 1;
  string text = 2;
  reserved 20 to 39;
}

message CommandResolveApproval {
  string approval_id = 1;
  bool approved = 2;
  string reason = 3;
  reserved 20 to 39;
}

message CommandInterruptTurn {
  string session_id = 1;
  string turn_id = 2;
  reserved 20 to 39;
}

message CommandSendTeamMessage {
  string team_id = 1;
  string recipient_member_id = 2;
  string text = 3;
  reserved 20 to 39;
}

message CommandBroadcastTeamMessage {
  string team_id = 1;
  string text = 2;
  reserved 20 to 39;
}

message CommandSpawnTeamMember {
  string team_id = 1;
  string title = 2;
  string prompt = 3;
  string model_preset = 4;
  reserved 20 to 39;
}

message CommandRetryDelivery {
  string delivery_id = 1;
  reserved 20 to 39;
}

message CommandCancelDelivery {
  string message_id = 1;
  reserved 20 to 39;
}

message CommandKillProcess {
  string process_id = 1;
  reserved 20 to 39;
}

message CommandStartProcess {
  string command = 1;
  string cwd = 2;
  uint64 timeout_ms = 3;
  reserved 20 to 39;
}

message CommandAccepted {
  string command_id = 1;
  uint64 gateway_seq = 2;
  reserved 20 to 39;
}

message CommandRejected {
  string command_id = 1;
  ErrorDetail error = 2;
  reserved 20 to 39;
}

message CommandDuplicate {
  string command_id = 1;
  string original_command_id = 2;
  reserved 20 to 39;
}

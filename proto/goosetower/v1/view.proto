syntax = "proto3";

package goosetower.v1;

import "goosetower/v1/common.proto";

message SourceHealthView {
  string source_id = 1;
  string display_name = 2;
  string source_kind = 3;
  string health = 4;
  SourceCursor cursor = 5;
  int64 observed_at_unix_ms = 6;
  string lifecycle = 7;
  string provisioner_kind = 8;
  repeated string provider_kinds = 9;
  repeated string models = 10;
  uint32 active_session_count = 11;
  uint32 active_process_count = 12;
  uint32 process_capacity = 13;
  bool supports_worktrees = 14;
  bool supports_teams = 15;
  uint64 replay_window_events = 16;
  uint64 replay_window_ms = 17;
  string region = 18;
  string cost_hint = 19;
  repeated ModelCapabilityView model_capabilities = 50;
  reserved 20 to 49;
}

message ModelCapabilityView {
  string provider = 1;
  string model = 2;
  string display_name = 3;
  repeated string reasoning_levels = 4;
}

message FleetRowView {
  string row_id = 1;
  string source_id = 2;
  string session_id = 3;
  string team_id = 4;
  string provider = 5;
  string model = 6;
  string status = 7;
  string title = 8;
  string worktree_path = 9;
  uint32 pending_approval_count = 10;
  int64 latest_activity_unix_ms = 11;
  reserved 30 to 79;
}

message SessionView {
  string source_id = 1;
  string session_id = 2;
  string provider = 3;
  string model = 4;
  string status = 5;
  string cwd = 6;
  string worktree_path = 7;
  string active_turn_id = 8;
  optional uint32 context_remaining_percent = 30;
  optional uint64 context_window_tokens = 31;
  optional uint64 context_used_tokens = 32;
  reserved 33 to 79;
}

message TeamView {
  string source_id = 1;
  string team_id = 2;
  string name = 3;
  string lead_member_id = 4;
  repeated TeamMemberView members = 5;
  reserved 30 to 79;
}

message TeamMemberView {
  string member_id = 1;
  string session_id = 2;
  string title = 3;
  string provider = 4;
  string model = 5;
  string status = 6;
  reserved 30 to 79;
}

message ApprovalView {
  string source_id = 1;
  string approval_id = 2;
  string session_id = 3;
  string turn_id = 4;
  string risk = 5;
  string status = 6;
  string summary = 7;
  reserved 30 to 79;
}

message ProcessView {
  string source_id = 1;
  string process_id = 2;
  string status = 3;
  string command = 4;
  int32 exit_code = 5;
  reserved 30 to 79;
}

message WorktreeView {
  string source_id = 1;
  string worktree_id = 2;
  string path = 3;
  string branch = 4;
  string status = 5;
  reserved 30 to 79;
}

// Declares how a view body changes browser materialized state. Snapshots are
// authoritative replacements; patches explicitly upsert or remove an entity.
enum ViewOperation {
  VIEW_OPERATION_UNSPECIFIED = 0;
  VIEW_OPERATION_REPLACE = 1;
  VIEW_OPERATION_UPSERT = 2;
  VIEW_OPERATION_REMOVE = 3;
  reserved 20 to 39;
}

message ViewCoverage {
  // Stable normalized browser domains covered by this frame, for example
  // "session_details" or "team_workspaces".
  repeated string domains = 1;
  // Empty means the complete domain within the enclosing snapshot scope. For
  // bounded snapshots that scope is identified by Snapshot.subscription_id;
  // otherwise replacement/removal is scoped to these entity IDs.
  repeated string entity_ids = 2;
  bool authoritative = 3;
  reserved 20 to 39;
}

message Snapshot {
  string view_kind = 1;
  CursorVector cursor = 2;
  bytes body = 3;
  uint32 schema_version = 4;
  ViewOperation operation = 5;
  ViewCoverage coverage = 6;
  // Identifies the active bounded view whose exact coverage this snapshot
  // installs. Empty is reserved for legacy producers.
  string subscription_id = 7;
  reserved 20 to 49;
}

message Patch {
  string view_kind = 1;
  EntityRef entity = 2;
  CursorVector cursor = 3;
  bytes body = 4;
  uint32 schema_version = 5;
  ViewOperation operation = 6;
  ViewCoverage coverage = 7;
  reserved 20 to 49;
}

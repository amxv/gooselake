name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x86_64
            bun_target: bun-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            bun_target: bun-linux-arm64
          - os: macos-14
            platform: darwin
            arch: arm64
            bun_target: bun-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Generate OpenAPI Artifact
        run: cargo run -p runtime-server --bin gg-runtime-server -- --write-openapi

      - name: Package Release
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --bun-target "${{ matrix.bun_target }}" \
            --output dist

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: gg-runtime-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/gg-runtime-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/gg-runtime-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz

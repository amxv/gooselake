openapi: 3.1.0
info:
  title: GG Standalone Agent Runtime API
  version: 0.1.0
  summary: Single-user hosted runtime for Codex/Claude/ACP sessions, teams, processes, worktrees, and SSE streams
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
paths:
  /health:
    get:
      summary: Public health check
      security: []
      responses:
        "200":
          description: JSON response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
  /openapi.yaml:
    get:
      summary: Generated OpenAPI schema
      security: []
      responses:
        "200":
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /v1/diagnostics:
    get:
      summary: Runtime diagnostics summary
      responses:
        "200":
          description: JSON response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
  /v1/diagnostics/comms:
    get:
      summary: Team comms diagnostics
      responses:
        "200":
          description: JSON response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonObject"
  /v1/diagnostics/processes:
